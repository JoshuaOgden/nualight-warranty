<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="Nualight refrigerated display light">
  <defs>
    <linearGradient id="tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9edf0"/>
      <stop offset="0.5" stop-color="#c4ccd2"/>
      <stop offset="1" stop-color="#9aa5ad"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7f9"/>
      <stop offset="1" stop-color="#d5dde2"/>
    </linearGradient>
  </defs>
  <!-- end cap -->
  <rect x="18" y="70" width="46" height="60" rx="8" fill="#ffffff" stroke="#cfd6db" stroke-width="2"/>
  <rect x="30" y="52" width="22" height="24" rx="5" fill="#ffffff" stroke="#cfd6db" stroke-width="2"/>
  <circle cx="41" cy="63" r="4" fill="#e4e9ec"/>
  <!-- body -->
  <rect x="56" y="82" width="446" height="36" rx="8" fill="url(#tube)" stroke="#aab3b9" stroke-width="1.5"/>
  <!-- lens strip -->
  <rect x="70" y="90" width="424" height="18" rx="6" fill="url(#lens)"/>
  <rect x="70" y="94" width="424" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
</svg>
